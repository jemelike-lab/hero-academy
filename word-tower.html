<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0b2e">
<title>Word Tower · Hero Academy</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/humphrey.css">
<link rel="manifest" href="manifest.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@600;700&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;height:100%;width:100%;overflow-x:hidden;}
  body{padding-top:env(safe-area-inset-top,0px);padding-bottom:env(safe-area-inset-bottom,0px);min-height:100dvh;display:flex;flex-direction:column;}

  /* Header */
  .wt-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;z-index:10;flex-wrap:wrap;gap:8px;}
  .wt-back{background:rgba(0,0,0,0.4);border:2px solid var(--border-light);border-radius:50px;color:#fff;padding:8px 16px;font:600 14px var(--font-display);cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:6px;transition:background .2s;}
  .wt-back:hover{background:rgba(255,255,255,0.12);}
  .wt-title{font-family:var(--font-display);font-weight:700;font-size:18px;letter-spacing:0.04em;color:#fff;}
  .wt-title small{display:block;font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--emerald);font-weight:600;margin-top:2px;}
  .wt-counter{font-family:var(--font-display);font-weight:600;font-size:14px;color:var(--gold-bright);background:rgba(0,0,0,0.35);border:1px solid var(--border-light);border-radius:50px;padding:6px 12px;}

  /* Stage */
  .wt-stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 20px 40px;gap:24px;position:relative;}
  .wt-pattern{display:inline-block;font-family:var(--font-display);font-weight:600;font-size:13px;letter-spacing:0.18em;color:var(--cyan-bright);text-transform:uppercase;background:rgba(20,184,212,0.14);border:1px solid rgba(56,204,234,0.4);border-radius:50px;padding:5px 14px;}
  .wt-word-card{background:linear-gradient(135deg,rgba(255,255,255,0.10),rgba(255,255,255,0.04));border:2px solid var(--border-light);border-radius:32px;padding:36px 28px;min-width:280px;max-width:90vw;text-align:center;box-shadow:var(--shadow-card);}
  .wt-word{font-family:var(--font-display);font-weight:700;font-size:clamp(72px,16vw,140px);line-height:1;letter-spacing:0.04em;background:linear-gradient(135deg,#fff,var(--gold-bright) 50%,var(--magenta-bright));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 4px 14px rgba(255,209,71,0.30));}

  /* Mic button — the primary action */
  .wt-mic-btn{position:relative;background:linear-gradient(135deg,var(--magenta),var(--orange));border:none;color:#fff;font-family:var(--font-display);font-weight:700;font-size:22px;padding:20px 40px;border-radius:50px;cursor:pointer;box-shadow:0 8px 28px rgba(236,72,153,0.5),inset 0 -3px 0 rgba(0,0,0,0.18);min-width:240px;transition:transform .15s var(--ease-bounce),box-shadow .2s;display:inline-flex;align-items:center;justify-content:center;gap:10px;}
  .wt-mic-btn:hover:not(:disabled){transform:translateY(-2px);}
  .wt-mic-btn:active:not(:disabled){transform:translateY(1px);}
  .wt-mic-btn:disabled{opacity:0.55;cursor:not-allowed;}
  .wt-mic-btn.listening{background:linear-gradient(135deg,var(--cyan),var(--electric));box-shadow:0 0 0 0 rgba(56,204,234,0.55);animation:wt-pulse 1.2s ease-in-out infinite;}
  .wt-mic-btn.thinking{background:linear-gradient(135deg,#7b6cf2,#a855f7);}
  .wt-mic-btn.passed{background:linear-gradient(135deg,var(--emerald),#42d59c);box-shadow:0 8px 28px rgba(46,194,126,0.6);}
  .wt-mic-btn.failed{background:linear-gradient(135deg,var(--orange),var(--gold));box-shadow:0 8px 28px rgba(255,139,61,0.5);}
  @keyframes wt-pulse{0%,100%{box-shadow:0 8px 28px rgba(56,204,234,0.45),0 0 0 0 rgba(56,204,234,0.55);}50%{box-shadow:0 8px 28px rgba(56,204,234,0.45),0 0 0 20px rgba(56,204,234,0);}}

  /* Status line */
  .wt-status{font-family:var(--font-body);font-weight:600;font-size:16px;color:var(--text-dim);max-width:560px;text-align:center;line-height:1.45;min-height:24px;padding:0 16px;}
  .wt-status--pass{color:var(--emerald-bright);}
  .wt-status--fail{color:var(--orange-bright);}
  .wt-status--error{color:var(--red-bright);}
  .wt-status--hint{color:var(--text-dim);}

  /* Try Again button */
  .wt-tryagain{background:rgba(0,0,0,0.4);border:2px solid var(--gold);color:var(--gold-bright);font-family:var(--font-display);font-weight:700;font-size:16px;padding:12px 28px;border-radius:50px;cursor:pointer;transition:background .2s,transform .15s;}
  .wt-tryagain:hover{background:rgba(255,209,71,0.18);transform:translateY(-1px);}

  /* End session button */
  .wt-end-btn{background:transparent;border:2px solid var(--border-light);color:var(--text-dim);font-family:var(--font-display);font-weight:600;font-size:13px;padding:8px 18px;border-radius:50px;cursor:pointer;transition:background .2s;}
  .wt-end-btn:hover{background:rgba(255,255,255,0.08);}

  /* End-of-session card */
  .wt-end-card{background:linear-gradient(135deg,rgba(255,255,255,0.10),rgba(255,255,255,0.04));border:2px solid var(--gold);border-radius:32px;padding:36px 28px;max-width:480px;margin:60px auto;text-align:center;box-shadow:0 16px 48px rgba(255,209,71,0.25);}
  .wt-end-title{font-family:var(--font-display);font-weight:700;font-size:30px;background:linear-gradient(135deg,var(--gold-bright),var(--magenta));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:18px;}
  .wt-end-line{font-family:var(--font-body);font-weight:700;font-size:18px;color:#fff;margin:8px 0;}
  .wt-end-line strong{color:var(--gold-bright);font-size:24px;font-family:var(--font-display);}
  .wt-end-line--soft{color:var(--text-dim);font-size:14px;font-weight:600;margin-top:14px;line-height:1.5;}
  .wt-end-actions{display:flex;gap:12px;justify-content:center;margin-top:24px;flex-wrap:wrap;}
  .wt-end-restart{background:linear-gradient(135deg,var(--magenta),var(--orange));border:none;color:#fff;font-family:var(--font-display);font-weight:700;font-size:15px;padding:12px 26px;border-radius:50px;cursor:pointer;box-shadow:0 6px 20px rgba(236,72,153,0.45);}
  .wt-end-home{background:transparent;border:2px solid var(--border-light);color:#fff;font-family:var(--font-display);font-weight:600;font-size:15px;padding:10px 24px;border-radius:50px;cursor:pointer;text-decoration:none;display:inline-block;}
</style>
</head>
<body>

  <header class="wt-header">
    <a href="index.html" class="wt-back">← Back</a>
    <div class="wt-title">Word Tower<small>Consonant Digraphs</small></div>
    <div class="wt-counter" id="wt-counter">Word 1 of 8</div>
  </header>

  <main class="wt-stage" id="wt-stage">
    <span class="wt-pattern" id="wt-pattern" hidden></span>
    <div class="wt-word-card">
      <div class="wt-word" id="wt-word">…</div>
    </div>
    <button class="wt-mic-btn" id="wt-mic-btn" type="button">
      <span class="wt-mic-label">🎤 Read it!</span>
    </button>
    <div class="wt-status" id="wt-status" hidden></div>
    <button class="wt-tryagain" id="wt-tryagain-btn" type="button" hidden>Try again</button>
    <button class="wt-end-btn" id="wt-end-btn" type="button">End session</button>
  </main>

  <section class="wt-end-card" id="wt-end-card" hidden>
    <div class="wt-end-title">Great reading!</div>
    <div id="wt-end-stats"></div>
    <div class="wt-end-actions">
      <button class="wt-end-restart" id="wt-restart-btn" type="button">Read more words</button>
      <a class="wt-end-home" href="index.html">Back to Hero Academy</a>
    </div>
  </section>

  <!-- Ms. Humphrey passive presence (corner portrait + speech bubble) -->
  <script src="js/humphrey.js"></script>
  <script src="js/humphrey-listener.js"></script>
  <script src="js/humphrey-chat.js"></script>
  <script src="js/humphrey-memory.js"></script>

  <!-- Read-aloud session -->
  <script src="js/word-lists.js"></script>
  <script src="js/word-tower-reading.js"></script>

  <script>
    if (window.HeroAcademy && window.HeroAcademy.Humphrey) {
      // No welcomeEvent — js/word-tower-reading.js boot() already fires its
      // own instructive welcome ("I'll show you a word, you read it..."),
      // which is what we want here. Catalog welcome would duplicate.
      window.HeroAcademy.Humphrey.init({
        position: 'bottom-left',
        audioEnabled: true,
        debug: false,
        kidName: 'Nigel',
      });
    }
  </script>
  <script src="js/telemetry.js"></script>
  <script src="js/characters.js"></script>
  <script src="js/sw-register.js"></script>
  <script src="js/break-timer.js" defer></script>
</body>
</html>
