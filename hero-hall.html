<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#fed7aa">
<title>Hero Hall · Hero Academy</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="css/humphrey.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Fredoka:wght@400;500;600;700&family=Nunito:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-space:#fff7ed; --bg-deep:#fed7aa; --bg-purple:#c7d2fe;
    --gold:#ffd147; --gold-bright:#ffe580;
    --orange:#ff8b3d;
    --magenta:#ec4899;
    --cyan:#14b8d4; --cyan-bright:#38ccea;
    --emerald:#2ec27e;
    --purple:#a855f7;
    --red:#ef4444;
    --surface-glass:rgba(255,255,255,0.78);
    --border-light:rgba(91,33,182,0.18);
    --text:#1e293b;
    --font-display:'Fredoka','SF Pro Rounded',system-ui,sans-serif;
    --font-retro:'Bungee',var(--font-display);
    --safe-top:env(safe-area-inset-top,0px);
    --safe-bottom:env(safe-area-inset-bottom,0px);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    min-height: 100vh;
    background:
      radial-gradient(circle at 20% 10%, rgba(168,85,247,.18), transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(20,184,212,.18), transparent 40%),
      linear-gradient(180deg, var(--bg-space), var(--bg-deep) 40%, var(--bg-purple));
    background-attachment: fixed;
    color: var(--text);
    font-family: var(--font-display);
    -webkit-tap-highlight-color: transparent;
  }
  /* Twinkling stars background */
  body::before {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image:
      radial-gradient(1.5px 1.5px at 12% 22%, rgba(255,209,71,.7), transparent),
      radial-gradient(1.5px 1.5px at 78% 14%, rgba(236,72,153,.5), transparent),
      radial-gradient(1.5px 1.5px at 33% 67%, rgba(168,85,247,.5), transparent),
      radial-gradient(1.5px 1.5px at 88% 78%, rgba(46,194,126,.5), transparent),
      radial-gradient(1.5px 1.5px at 55% 40%, rgba(20,184,212,.55), transparent),
      radial-gradient(2px 2px at 8% 88%, rgba(255,209,71,.6), transparent),
      radial-gradient(1.5px 1.5px at 92% 35%, rgba(255,209,71,.5), transparent);
    animation: twinkle 4s ease-in-out infinite alternate;
  }
  @keyframes twinkle {
    from { opacity: .5; } to { opacity: 1; }
  }

  .page {
    position: relative; z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: calc(var(--safe-top) + 18px) 18px calc(var(--safe-bottom) + 32px);
  }

  /* --- Header --- */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px; margin-bottom: 20px;
  }
  .back-btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--surface-glass);
    border: 1px solid var(--border-light);
    color: var(--text); text-decoration: none;
    padding: 10px 16px; border-radius: 999px;
    font-family: var(--font-display); font-weight: 600; font-size: 15px;
    backdrop-filter: blur(8px);
    transition: transform .12s ease, background .2s ease;
  }
  .back-btn:active { transform: scale(.96); background: rgba(255,255,255,.14); }

  .header {
    text-align: center;
    margin: 8px 0 26px;
  }
  .header h1 {
    font-family: var(--font-retro);
    font-size: clamp(36px, 8vw, 60px);
    margin: 0;
    background: linear-gradient(180deg,var(--orange),var(--magenta) 50%,var(--violet));
    -webkit-background-clip: text; background-clip: text; color: transparent;
    text-shadow: 0 2px 14px rgba(91,33,182,0.18);
    letter-spacing: 1px;
  }
  .header p {
    margin: 8px auto 0;
    max-width: 600px;
    color: rgba(30,41,59,.85);
    font-size: 16px; font-weight: 500;
  }

  /* --- Stats bar --- */
  .stats {
    display: flex; justify-content: center; gap: 16px;
    margin: 0 auto 28px;
    flex-wrap: wrap;
  }
  .stat {
    background: var(--surface-glass);
    border: 1px solid var(--border-light);
    border-radius: 18px;
    padding: 12px 20px;
    text-align: center;
    backdrop-filter: blur(10px);
  }
  .stat .num {
    font-family: var(--font-retro);
    font-size: 28px; color:var(--gold-text);
    line-height: 1;
  }
  .stat .lbl {
    font-size: 12px; text-transform: uppercase; letter-spacing: 1.2px;
    color: rgba(30,41,59,.7); margin-top: 4px; font-weight: 600;
  }

  /* --- Grid --- */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
  }

  /* --- Card --- */
  .card {
    position: relative;
    background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.02));
    border: 2px solid var(--border-light);
    border-radius: 22px;
    padding: 18px 16px 16px;
    text-align: center;
    backdrop-filter: blur(10px);
    transition: transform .15s ease, border-color .2s ease, box-shadow .2s ease;
    cursor: pointer;
    overflow: hidden;
  }
  .card::before {
    /* color-tinted glow per-character (set via --char-color) */
    content:''; position:absolute; inset:-2px;
    border-radius: 22px;
    background: radial-gradient(circle at 50% 0%, var(--char-color, var(--gold)), transparent 70%);
    opacity: 0; transition: opacity .25s ease;
    z-index: 0; pointer-events: none;
  }
  .card.unlocked { border-color: var(--char-color, var(--gold)); }
  /* Episode progression pips (3 dots under each card) */
  .episode-pips { display:flex; gap:6px; justify-content:center; margin-top:10px; }
  .pip { width:9px; height:9px; border-radius:50%; background:rgba(255,255,255,.18);
         border:1.5px solid rgba(255,255,255,.32); transition:all .25s; }
  .pip.filled { background:var(--char-color, #ffd147);
                border-color:var(--char-color, #ffd147);
                box-shadow:0 0 8px var(--char-color, #ffd147); }
  .card.squad-ready { border-width:3px; box-shadow:0 0 28px var(--char-color, #ffd147); }
  .card.squad-ready::after { content:'★ SQUAD'; position:absolute; top:8px; right:10px;
                              font-size:0.65rem; font-weight:700; letter-spacing:0.1em;
                              color:var(--char-color, #ffd147); text-shadow:0 0 8px currentColor; }
  /* Episode story log inside the modal */
  .modal .ep-log { margin-top:14px; }
  .modal .ep-row { display:flex; gap:10px; align-items:flex-start; padding:10px 0;
                   border-top:1px solid rgba(255,255,255,.12); }
  .modal .ep-row:first-child { border-top:none; }
  .modal .ep-badge { flex:none; font-size:0.68rem; font-weight:700; letter-spacing:0.1em;
                     padding:4px 8px; border-radius:8px; background:rgba(255,209,71,0.16);
                     color:var(--gold-text); min-width:48px; text-align:center; }
  .modal .ep-row.locked .ep-badge { color:rgba(30,41,59,0.4);
                                    background:rgba(255,255,255,0.05); }
  .modal .ep-text { flex:1; font-size:0.95rem; line-height:1.5;
                    color:rgba(245,232,200,0.92); text-align:left; }
  .modal .ep-row.locked .ep-text { color:rgba(30,41,59,0.4); font-style:italic; }
  .card.unlocked::before { opacity: .25; }
  .card.unlocked:active { transform: scale(.97); }
  .card.locked { opacity: .58; filter: grayscale(.7); }

  .card > * { position: relative; z-index: 1; }

  .card .new-badge {
    position: absolute; top: 10px; right: 10px;
    background: var(--gold);
    color: var(--bg-deep);
    font-size: 10px; font-weight: 700;
    padding: 4px 8px; border-radius: 999px;
    letter-spacing: .8px; text-transform: uppercase;
    box-shadow: 0 3px 10px rgba(255,209,71,.5);
    z-index: 2;
  }

  .card .art {
    position: relative;
    width: 110px; height: 110px;
    margin: 0 auto 10px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    background:
      radial-gradient(circle at 30% 30%, rgba(255,255,255,.18), transparent 60%),
      radial-gradient(circle, var(--char-color, var(--gold)) 0%, transparent 75%);
    box-shadow: inset 0 0 0 3px rgba(255,255,255,.12);
  }
  .card .art .main {
    font-size: 64px; line-height: 1;
    filter: drop-shadow(0 4px 10px rgba(0,0,0,.4));
  }
  .card .art .acc {
    position: absolute; top: 4px; right: 6px;
    font-size: 28px;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,.4));
  }
  .card.locked .art {
    background: rgba(255,255,255,.06);
  }
  .card.locked .art .main { content: '❓'; }
  .card.locked .art .acc  { display: none; }

  .card h3 {
    margin: 6px 0 2px;
    font-family: var(--font-display);
    font-size: 19px; font-weight: 700;
    color:var(--gold-text);
  }
  .card.locked h3 { color: rgba(30,41,59,.6); }
  .card .role {
    font-size: 12px; font-style: italic;
    color: rgba(30,41,59,.75);
    margin-bottom: 8px;
  }
  .card .bio {
    font-size: 13px; line-height: 1.4;
    color: rgba(30,41,59,.82);
    min-height: 56px;
  }
  .card.locked .bio { color: rgba(30,41,59,.5); }

  /* Member chips (for Shellback Squad / Toybox Team) */
  .members {
    display: flex; justify-content: center; gap: 6px;
    margin-top: 10px; flex-wrap: wrap;
  }
  .member {
    display: inline-flex; align-items: center; gap: 4px;
    background: rgba(255,255,255,.1);
    border: 1px solid rgba(255,255,255,.15);
    padding: 3px 8px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
  }
  .card.locked .members { display: none; }

  /* --- Reset button --- */
  .reset-row {
    text-align: center; margin-top: 32px;
  }
  .reset-btn {
    background: none; border: 1px dashed rgba(255,255,255,.25);
    color: rgba(30,41,59,.6);
    padding: 8px 16px; border-radius: 999px;
    font-family: var(--font-display); font-size: 13px; font-weight: 500;
    cursor: pointer;
  }
  .reset-btn:active { background: rgba(255,255,255,.06); }

  /* --- Modal (tap a card to inspect) --- */
  .modal-bg {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(6,8,31,.85);
    backdrop-filter: blur(8px);
    display: none; align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: linear-gradient(180deg, var(--bg-deep), var(--bg-purple));
    border: 3px solid var(--char-color, var(--gold));
    border-radius: 28px;
    padding: 28px 24px;
    max-width: 380px; width: 100%;
    text-align: center;
    box-shadow: 0 30px 70px rgba(0,0,0,.6);
    position: relative;
  }
  .modal .close {
    position: absolute; top: 12px; right: 14px;
    background: none; border: none;
    color: rgba(30,41,59,.7);
    font-size: 28px; cursor: pointer;
  }
  .modal .big-art {
    width: 140px; height: 140px; margin: 0 auto 14px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--char-color, var(--gold)) 0%, transparent 75%);
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .modal .big-art .main { font-size: 84px; filter: drop-shadow(0 6px 14px rgba(0,0,0,.5)); }
  .modal .big-art .acc  { position:absolute; top:6px; right:10px; font-size:36px; }
  .modal h2 {
    font-family: var(--font-retro);
    color:var(--gold-text); margin: 4px 0 0;
    font-size: 26px;
  }
  .modal .modal-title {
    font-style: italic;
    color: rgba(30,41,59,.85);
    margin: 4px 0 14px;
  }
  .modal .modal-bio {
    color: rgba(30,41,59,.9);
    line-height: 1.5;
    margin: 0 0 14px;
  }
  .modal .modal-quote {
    background: rgba(255,255,255,.08);
    border-left: 3px solid var(--char-color, var(--gold));
    padding: 10px 14px;
    border-radius: 10px;
    font-style: italic;
    color:var(--gold-text);
    margin-top: 14px;
    text-align: left;
  }
  .card { opacity: 0; animation: hh-card-in .5s ease-out forwards; }
  @keyframes hh-card-in { 0% { opacity:0; transform:translateY(20px) scale(.95); } 100% { opacity:1; transform:translateY(0) scale(1); } }
  .card .hint { font-size:12px; color:var(--cyan-bright); margin-top:8px; font-weight:600; letter-spacing:.5px; }
  /* ------- Build #3 — Hero Level header + next-step rows ------- */
  .hero-level-card {
    background: linear-gradient(135deg, rgba(20,184,212,0.18), rgba(236,72,153,0.18));
    border: 1px solid rgba(255,209,71,0.35);
    border-radius: 20px;
    padding: 18px 20px;
    margin: 0 auto 18px;
    max-width: 760px;
  }
  .hero-level-row {
    display: flex;
    gap: 18px;
    align-items: center;
  }
  .hero-level-badge {
    flex: 0 0 auto;
    text-align: center;
    background: linear-gradient(135deg, #ffd147, #ff8b3d);
    color: #1a0f2e;
    border-radius: 18px;
    padding: 14px 18px 10px;
    min-width: 72px;
    box-shadow: 0 4px 14px rgba(255,139,61,0.35);
  }
  .hero-level-num {
    font-family: var(--font-retro, 'Press Start 2P', monospace);
    font-size: 28px;
    line-height: 1;
  }
  .hero-level-lbl {
    font-size: 10px;
    letter-spacing: 2px;
    margin-top: 6px;
    font-weight: 700;
  }
  .hero-level-body {
    flex: 1 1 auto;
    min-width: 0;
  }
  .hero-level-title {
    font-size: 18px;
    font-weight: 700;
    color:var(--gold-text);
    margin-bottom: 8px;
  }
  .hero-level-progress-bar-frame {
    background: rgba(255,255,255,0.1);
    border-radius: 999px;
    height: 10px;
    overflow: hidden;
    margin-bottom: 6px;
  }
  .hero-level-progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--cyan-bright, #14b8d4), #ec4899);
    border-radius: 999px;
    transition: width 0.6s ease-out;
  }
  .hero-level-progress-text {
    font-size: 12px;
    opacity: 0.8;
  }
  @media (max-width: 480px) {
    .hero-level-badge { min-width: 60px; padding: 12px 14px 8px; }
    .hero-level-num { font-size: 22px; }
    .hero-level-title { font-size: 15px; }
  }
  /* Next-step row inside each character card */
  .next-step {
    margin-top: 10px;
    padding: 10px 12px;
    background: rgba(255,255,255,0.04);
    border: 1px dashed rgba(255,209,71,0.35);
    border-radius: 12px;
    text-align: left;
  }
  .next-step.is-complete {
    background: linear-gradient(135deg, rgba(255,209,71,0.18), rgba(255,139,61,0.12));
    border: 1px solid rgba(255,209,71,0.55);
    text-align: center;
    font-family: var(--font-retro, 'Press Start 2P', monospace);
    font-size: 11px;
    letter-spacing: 1.5px;
    color:var(--gold-text);
    padding: 12px;
  }
  .next-step.is-almost {
    border-color: rgba(20,184,212,0.7);
    box-shadow: 0 0 14px rgba(20,184,212,0.35);
    animation: nextStepPulse 1.6s ease-in-out infinite;
  }
  @keyframes nextStepPulse {
    0%,100% { box-shadow: 0 0 14px rgba(20,184,212,0.35); }
    50%     { box-shadow: 0 0 22px rgba(20,184,212,0.65); }
  }
  .next-step-eyebrow {
    font-size: 10px;
    letter-spacing: 1.2px;
    color: var(--cyan-bright, #14b8d4);
    text-transform: uppercase;
    margin-bottom: 4px;
    font-weight: 700;
  }
  .next-step-text {
    font-size: 13px;
    color: #f4eff8;
    line-height: 1.4;
  }
</style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <a class="back-btn" href="index.html">‹ Back</a>
      <div style="font-family:var(--font-retro);font-size:13px;letter-spacing:1.5px;color:var(--cyan-bright);">TROPHY ROOM</div>
    </div>

    <div class="header">
      <h1>🏆 Hero Hall 🏆</h1>
      <p>The Surprise Squad — collect them all by playing across every zone!</p>
    </div>

    <!-- Build #3 — Hero Level header. Renders into the spans below. -->
    <section class="hero-level-card" id="heroLevelCard" aria-label="Hero level">
      <div class="hero-level-row">
        <div class="hero-level-badge">
          <div class="hero-level-num" id="heroLevelNum">–</div>
          <div class="hero-level-lbl">LEVEL</div>
        </div>
        <div class="hero-level-body">
          <div class="hero-level-title" id="heroLevelTitle">…</div>
          <div class="hero-level-progress-bar-frame">
            <div class="hero-level-progress-bar-fill" id="heroLevelBar" style="width:0%"></div>
          </div>
          <div class="hero-level-progress-text" id="heroLevelText">0 of 15 hero chapters earned</div>
        </div>
      </div>
    </section>

    <div class="stats">
      <div class="stat"><div class="num" id="stat-unlocked">0</div><div class="lbl">Unlocked</div></div>
      <div class="stat"><div class="num" id="stat-total">0</div><div class="lbl">Total Cards</div></div>
      <div class="stat"><div class="num" id="stat-percent">0%</div><div class="lbl">Complete</div></div>
      <div class="stat"><div class="num" id="stat-skills">0</div><div class="lbl">Skills ⭐</div></div>
      <div class="stat"><div class="num" id="stat-coins">0</div><div class="lbl">Coins 🪙</div></div>
    </div>

    <div class="grid" id="grid"></div>

    <div class="reset-row">
      <button class="reset-btn" id="reset-btn">Reset Hero Hall</button>
    </div>
  </div>

  <div class="modal-bg" id="modal-bg">
    <div class="modal" id="modal">
      <button class="close" id="modal-close" aria-label="close">×</button>
      <div class="big-art">
        <span class="main" id="m-emoji"></span>
        <span class="acc"  id="m-acc"></span>
      </div>
      <h2 id="m-name"></h2>
      <div class="modal-title" id="m-title"></div>
      <p class="modal-bio" id="m-bio"></p>
      <div class="members" id="m-members"></div>
      <div class="modal-quote" id="m-quote"></div>
      <div class="ep-log" id="m-ep-log"></div>
    </div>
  </div>

  <!-- Load telemetry + humphrey FIRST so the async rendering below can
       reach the Telemetry.rpc / Humphrey.say helpers immediately. -->
  <script src="js/telemetry.js"></script>
  <script src="js/humphrey.js"></script>
  <script src="js/characters.js"></script>
  <script src="js/session-progress.js" defer></script>
  <script src="js/break-timer.js" defer></script>
  <script>
    (async function () {
      const NS = window.HeroAcademy;
      const { CHARACTERS, readUnlocked, getProgress, fetchEpisodeStory } = NS.Characters;
      const grid = document.getElementById('grid');

      // legacy localStorage set (still used for the surprise overlay)
      const unlocked = new Set(readUnlocked());

      // Server-backed episode progression — {charKey: highestEpisode 0-3}
      let episodes = {};
      try { episodes = await getProgress(); } catch (e) { episodes = {}; }

      // Zone-to-hint mapping
      const ZONE_HINTS = {
        numberlab: 'Play in Number Lab 🔢',
        wordtower: 'Play in Word Tower 📖',
        discoverydome: 'Play in Discovery Dome 🔬',
        explorershall: 'Play in Diner Lanes 🍔',
        storylab: 'Write a story in Story Lab ✍️',
        win: 'Complete any game 🏆'
      };
      function hintFor(zones) {
        var playable = zones.filter(z => ZONE_HINTS[z] && ZONE_HINTS[z].indexOf('Coming') === -1);
        if (playable.length) return ZONE_HINTS[playable[Math.floor(Math.random() * playable.length)]];
        return ZONE_HINTS[zones[0]] || 'Keep playing!';
      }

      // Stats — characters
      const discoveredCount = CHARACTERS.filter(c => (episodes[c.id] || 0) >= 1 || unlocked.has(c.id)).length;
      const squadReadyCount = CHARACTERS.filter(c => (episodes[c.id] || 0) >= 3).length;
      document.getElementById('stat-unlocked').textContent = discoveredCount;
      document.getElementById('stat-total').textContent = CHARACTERS.length;
      document.getElementById('stat-percent').textContent =
        Math.round((discoveredCount / CHARACTERS.length) * 100) + '%';

      // Build #3 — Hero Level header
      const NS3 = NS.Characters;
      if (typeof NS3.heroLevel === 'function' && typeof NS3.totalEpisodesEarned === 'function') {
        const totalEps = NS3.totalEpisodesEarned(episodes);
        const lvl = NS3.heroLevel(totalEps);
        const within = Math.max(0, totalEps - lvl.floor);
        const span = Math.max(1, lvl.ceiling - lvl.floor);
        // Min-width sliver so the bar always reads as present, even at a fresh tier.
        const rawPct = Math.round((within / span) * 100);
        const pctIntoLevel = totalEps === 0 ? 0 : Math.max(4, Math.min(100, rawPct));
        document.getElementById('heroLevelNum').textContent = lvl.level;
        document.getElementById('heroLevelTitle').textContent = lvl.title + (lvl.level === 6 ? ' \u2014 max level!' : '');
        document.getElementById('heroLevelBar').style.width = pctIntoLevel + '%';
        document.getElementById('heroLevelText').textContent = totalEps + ' of 15 hero chapters earned' +
          (lvl.level < 6 ? ' \u00b7 ' + Math.max(0, lvl.ceiling - totalEps) + ' more to Level ' + (lvl.level + 1) : '');
      } else {
        // Older characters.js cached by an old SW; hide the header gracefully.
        const card = document.getElementById('heroLevelCard');
        if (card) card.hidden = true;
      }

      // Stats — journey (from game state)
      try {
        var gs = JSON.parse(localStorage.getItem('hero_academy_state_v1') || '{}');
        document.getElementById('stat-skills').textContent = (gs.skillsMastered || []).length;
        document.getElementById('stat-coins').textContent = gs.coins || 0;
      } catch(e) {}

      // Render grid with hints + stagger
      const milestones = (typeof NS3.readMilestones === 'function') ? NS3.readMilestones() : null;
      const canDescribe = typeof NS3.describeNextStep === 'function';
      CHARACTERS.forEach((c, idx) => {
        // Episode 0 = locked, 1-3 = arc progression.
        const ep = episodes[c.id] || 0;
        // Treat episode >= 1 as discovered; surprise-visit unlocks also count
        // (the legacy random visit system populates that set independently).
        const isDiscovered = ep >= 1 || unlocked.has(c.id);
        const isSquadReady = ep >= 3;

        // Build #3 — what does Nigel need to do to unlock the next chapter?
        let nextStepHtml = '';
        if (canDescribe) {
          const next = NS3.describeNextStep(c.id, milestones, ep);
          if (next.complete) {
            nextStepHtml = '<div class="next-step is-complete">' + next.label + '</div>';
          } else {
            const remaining = next.remaining;
            const labelTxt = remaining === 0
              ? 'Next chapter ready to unlock — keep playing to claim it!'
              : (remaining + ' more · ' + next.label);
            nextStepHtml = '<div class="next-step' + (next.almost ? ' is-almost' : '') + '">' +
              '<div class="next-step-eyebrow">Chapter ' + next.episode + '/3 \u2014 next up</div>' +
              '<div class="next-step-text">' + labelTxt + '</div>' +
            '</div>';
          }
        }

        const card = document.createElement('div');
        card.className = 'card ' +
          (isDiscovered ? 'unlocked' : 'locked') +
          (isSquadReady ? ' squad-ready' : '');
        card.style.setProperty('--char-color', c.color);
        card.style.animationDelay = (idx * 0.1) + 's';

        const pips =
          '<div class="episode-pips">' +
          [1, 2, 3].map(n => `<div class="pip${ep >= n ? ' filled' : ''}"></div>`).join('') +
          '</div>';

        card.innerHTML = `
          <div class="art">
            <span class="main">${isDiscovered ? c.emoji : '❓'}</span>
            ${isDiscovered && c.accessory ? `<span class="acc">${c.accessory}</span>` : ''}
          </div>
          <h3>${isDiscovered ? c.name : '???'}</h3>
          <div class="role">${isDiscovered ? c.archetype : 'Not yet discovered'}</div>
          <div class="bio">${isDiscovered ? c.bio : 'Play more games to meet this hero!'}</div>
          ${!isDiscovered ? `<div class="hint">${hintFor(c.zones)}</div>` : ''}
          ${isDiscovered && c.members ? `
            <div class="members">
              ${c.members.map(m => `<span class="member" style="border-color:${m.color}99;">${m.emoji} ${m.name}</span>`).join('')}
            </div>` : ''}
          ${isDiscovered ? pips : ''}
          ${nextStepHtml}
        `;
        if (isDiscovered) {
          card.addEventListener('click', () => openModal(c, ep));
        }
        grid.appendChild(card);
      });

      // Modal
      const modalBg = document.getElementById('modal-bg');
      const modal   = document.getElementById('modal');
      async function openModal(c, ep) {
        ep = ep || 0;
        modal.style.setProperty('--char-color', c.color);
        document.getElementById('m-emoji').textContent = c.emoji;
        document.getElementById('m-acc').textContent = c.accessory || '';
        document.getElementById('m-name').textContent = c.name;
        document.getElementById('m-title').textContent = c.title;
        document.getElementById('m-bio').textContent = c.bio;
        const mm = document.getElementById('m-members');
        mm.innerHTML = '';
        if (c.members) {
          c.members.forEach(m => {
            const ch = document.createElement('span');
            ch.className = 'member';
            ch.style.borderColor = m.color + '99';
            ch.textContent = `${m.emoji} ${m.name} — ${m.trait}`;
            mm.appendChild(ch);
          });
        }
        document.getElementById('m-quote').textContent = `"${c.voiceLine}"`;

        // --- Episode story log ---
        const epLog = document.getElementById('m-ep-log');
        const stages = ['Met', 'Trained', 'Squad'];
        epLog.innerHTML = stages.map((label, i) => {
          const epNum = i + 1;
          const earned = ep >= epNum;
          return '<div class="ep-row' + (earned ? '' : ' locked') + '" data-ep="' + epNum + '">' +
            '<div class="ep-badge">' + label + '</div>' +
            '<div class="ep-text" id="m-ep-text-' + epNum + '">' +
              (earned ? '<em style="opacity:.55">Loading…</em>' : 'Not earned yet — keep playing!') +
            '</div></div>';
        }).join('');

        modalBg.classList.add('open');

        // v162: Ms. Humphrey reads character details aloud.
        try {
          const H = window.HeroAcademy && window.HeroAcademy.Humphrey;
          if (H && typeof H.say === 'function') {
            if (typeof H.stop === 'function') H.stop();
            const intro = c.name + ', the ' + (c.title || 'hero') + '. ' + (c.bio || '');
            H.say('hero-hall-character', { kidName: 'Nigel', text: intro, expression: 'encouraging', priority: 'high' });
            if (c.voiceLine) {
              H.say('hero-hall-quote', { kidName: 'Nigel', text: c.name + ' says: ' + c.voiceLine, expression: 'encouraging' });
            }
          }
        } catch (_) {}

        // Lazy-fetch the earned episode stories
        for (let i = 1; i <= ep; i++) {
          try {
            const story = await fetchEpisodeStory(c.id, i);
            const slot = document.getElementById('m-ep-text-' + i);
            if (slot && story) {
              slot.textContent = story;
              try {
                const H2 = window.HeroAcademy && window.HeroAcademy.Humphrey;
                if (H2 && typeof H2.say === 'function') {
                  const stageLabel = ['Met', 'Trained', 'Squad'][i - 1] || ('Chapter ' + i);
                  H2.say('hero-hall-episode', { kidName: 'Nigel', text: stageLabel + '. ' + story, expression: 'encouraging' });
                }
              } catch (_) {}
            }
          } catch (e) { /* leave the placeholder */ }
        }
      }
      function closeModal() {
        modalBg.classList.remove('open');
        try {
          const H = window.HeroAcademy && window.HeroAcademy.Humphrey;
          if (H && typeof H.stop === 'function') H.stop();
        } catch (_) {}
      }
      document.getElementById('modal-close').addEventListener('click', closeModal);
      modalBg.addEventListener('click', e => { if (e.target === modalBg) closeModal(); });

      // Reset
      document.getElementById('reset-btn').addEventListener('click', () => {
        if (confirm('Reset Hero Hall? This will lock all cards again.')) {
          localStorage.removeItem(window.HeroAcademy.Characters.STORAGE_KEY);
          location.reload();
        }
      });
    })();
  </script>
</body>

<script>
  // telemetry.js + humphrey.js loaded earlier so the async grid render
  // can reach them. This block just kicks off Humphrey's welcome.
  if (window.HeroAcademy && window.HeroAcademy.Humphrey) {
    window.HeroAcademy.Humphrey.init({
      position: 'bottom-left',
      audioEnabled: true,
      debug: false,
      welcomeEvent: 'welcome-hero-hall',
      kidName: 'Nigel',
    });
  }
</script>
</html>
