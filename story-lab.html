<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
  <meta name="theme-color" content="#0a0b2e">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/story-lab.css">
  <link rel="stylesheet" href="css/humphrey.css">
  <link rel="stylesheet" href="css/canvas.css">
  <title>Story Lab · Hero Academy</title>
</head>
<body class="zone-body zone-story-lab">
  <div class="sky" aria-hidden="true">
    <div class="stars stars-1"></div>
    <div class="stars stars-2"></div>
    <div class="clouds"><div class="cloud cloud-1"></div><div class="cloud cloud-2"></div></div>
  </div>
  <header class="zone-header">
    <button class="back-btn" onclick="window.location.href='index.html'" aria-label="Back to map">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="22" height="22"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    </button>
    <div class="zone-header-title">
      <p class="zone-header-eyebrow">✍️ STORY LAB</p>
      <h1 class="zone-header-skill">Writing</h1>
    </div>
    <div class="zone-header-stats">
      <div class="mini-stat" title="Stories written">
        <span class="mini-stat-icon">📖</span>
        <span class="mini-stat-value" id="sl-count">0</span>
      </div>
    </div>
  </header>

  <main class="sl-main">
    <!-- All four screens render inside this stage div -->
    <div id="sl-stage" class="sl-stage sl-stage--picker"></div>
  </main>

  <button class="humphrey-btn" id="humphreyBtn" aria-label="Talk to Miss Humphrey">
    <span class="humphrey-pulse"></span>
    <span class="humphrey-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="22" height="22"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg></span>
    <span class="humphrey-label">Ms. Humphrey</span>
  </button>

  <!-- Data + session controller -->
  <script src="data/story-templates.js"></script>
  <script src="data/grade2-vocab.js"></script>
  <script src="js/story-lab.js"></script>
  <script src="js/canvas.js"></script>

  <!-- Ms. Humphrey passive presence (corner portrait + speech bubble + Q&A) -->
  <script src="js/humphrey.js"></script>
  <script src="js/humphrey-listener.js"></script>
  <script src="js/humphrey-chat.js"></script>
  <script src="js/humphrey-memory.js"></script>
  <script src="js/humphrey-qna.js"></script>
  <script>
    if (window.HeroAcademy && window.HeroAcademy.Humphrey) {
      // No welcomeEvent — story-lab.js fires a one-per-day welcome on the
      // picker screen using try-again-reading style. Same pattern as Word
      // Tower and Story Time (the zone's own intro is the welcome).
      window.HeroAcademy.Humphrey.init({
        position: 'bottom-left',
        audioEnabled: true,
        debug: false,
        kidName: 'Nigel',
      });
    }
    // Update the header counter once the data files have loaded.
    document.addEventListener('DOMContentLoaded', function () {
      try {
        var raw = localStorage.getItem('ha_stories');
        var arr = raw ? JSON.parse(raw) : [];
        var el = document.getElementById('sl-count');
        if (el) el.textContent = arr.length || 0;
      } catch (e) {}
    });
  </script>
  <script src="js/telemetry.js"></script>
  <script src="js/characters.js"></script>
  <script src="js/sw-register.js"></script>
</body>
</html>
