<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
  <meta name="theme-color" content="#0a0b2e">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/story-lab.css">
  <link rel="stylesheet" href="css/humphrey.css">
  <link rel="stylesheet" href="css/canvas.css">
  <style>
    /* "Today's Adventure" hero card — surfaces when AI-generated story exists.
       Lives ABOVE the existing picker stage. Nigel taps to read, then can also
       browse the static templates below. Non-destructive — the picker is
       untouched. */
    .ha-today-card {
      margin: 14px 16px 0;
      padding: 18px 18px 16px;
      border-radius: 22px;
      background: linear-gradient(135deg, #4338ca 0%, #7c3aed 60%, #c026d3 100%);
      color: #fff;
      box-shadow: 0 12px 32px rgba(76, 29, 149, 0.45);
      position: relative;
      overflow: hidden;
      font-family: 'Nunito', system-ui, sans-serif;
    }
    .ha-today-card::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(circle at 85% 15%, rgba(255,255,255,0.22), transparent 55%);
      pointer-events: none;
    }
    .ha-today-eyebrow {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
      font-weight: 700; opacity: 0.92;
      background: rgba(255,255,255,0.14); padding: 4px 10px; border-radius: 999px;
      margin-bottom: 8px;
    }
    .ha-today-title {
      font-family: 'Fredoka', system-ui, sans-serif;
      font-size: 24px; font-weight: 700; line-height: 1.15;
      margin: 0 0 6px;
    }
    .ha-today-preview {
      font-size: 14px; line-height: 1.45; opacity: 0.95;
      margin: 0 0 14px;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .ha-today-cta {
      appearance: none; border: none; cursor: pointer;
      background: #fff; color: #4c1d95;
      font-family: 'Fredoka', system-ui, sans-serif;
      font-weight: 700; font-size: 15px;
      padding: 11px 22px; border-radius: 999px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.18);
      transition: transform 0.15s ease;
    }
    .ha-today-cta:active { transform: scale(0.96); }
    .ha-today-card[hidden] { display: none !important; }

    /* Full-story reader overlay */
    .ha-today-reader {
      position: fixed; inset: 0; z-index: 9000;
      background: #f8fafc;
      display: flex; flex-direction: column;
      overflow-y: auto;
      padding: 18px 18px 80px;
      font-family: 'Nunito', sans-serif;
    }
    .ha-today-reader[hidden] { display: none; }
    .ha-today-reader-close {
      align-self: flex-end;
      appearance: none; border: none; cursor: pointer;
      background: #e2e8f0; color: #1e293b;
      width: 44px; height: 44px; border-radius: 999px;
      font-size: 22px; font-weight: 700;
    }
    .ha-today-reader h2 {
      font-family: 'Fredoka', sans-serif;
      color: #4c1d95;
      font-size: 26px; margin: 8px 0 16px;
    }
    .ha-today-reader p {
      font-size: 18px; line-height: 1.6; color: #1e293b;
      margin: 0 0 14px;
    }
    .ha-today-reader-questions {
      margin-top: 22px;
      padding: 14px 16px;
      background: #ede9fe; border-radius: 14px;
    }
    .ha-today-reader-questions h3 {
      font-family: 'Fredoka', sans-serif;
      font-size: 17px; color: #4c1d95; margin: 0 0 10px;
    }
    .ha-today-reader-questions ol {
      margin: 0; padding-left: 22px;
    }
    .ha-today-reader-questions li {
      font-size: 16px; line-height: 1.5; margin-bottom: 8px; color: #1e293b;
    }
  </style>
  <title>Story Lab · Hero Academy</title>
</head>
<body class="zone-body zone-story-lab">
  <div class="sky" aria-hidden="true">
    <div class="stars stars-1"></div>
    <div class="stars stars-2"></div>
    <div class="clouds"><div class="cloud cloud-1"></div><div class="cloud cloud-2"></div></div>
  </div>
  <header class="zone-header">
    <button class="back-btn" onclick="window.location.href='index.html'" aria-label="Back to map">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="22" height="22"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    </button>
    <div class="zone-header-title">
      <p class="zone-header-eyebrow">✍️ STORY LAB</p>
      <h1 class="zone-header-skill">Writing</h1>
    </div>
    <div class="zone-header-stats">
      <div class="mini-stat" title="Stories written">
        <span class="mini-stat-icon">📖</span>
        <span class="mini-stat-value" id="sl-count">0</span>
      </div>
    </div>
  </header>

  <!-- Today's Adventure card — populated by daily-content.js, hidden by default -->
  <section class="ha-today-card" id="ha-today-card" hidden>
    <span class="ha-today-eyebrow">✨ Today's Adventure</span>
    <h2 class="ha-today-title" id="ha-today-title">Loading…</h2>
    <p class="ha-today-preview" id="ha-today-preview"></p>
    <button class="ha-today-cta" id="ha-today-cta" type="button">Read with Ms. Humphrey →</button>
  </section>

  <main class="sl-main">
    <!-- All four screens render inside this stage div -->
    <div id="sl-stage" class="sl-stage sl-stage--picker"></div>
  </main>

  <!-- Full-story reader overlay -->
  <div class="ha-today-reader" id="ha-today-reader" hidden>
    <button class="ha-today-reader-close" id="ha-today-reader-close" aria-label="Close">×</button>
    <h2 id="ha-today-reader-title"></h2>
    <div id="ha-today-reader-body"></div>
    <!-- v149: interactive comprehension-question surface. Filled by JS once
         body finishes reading. Each question shows the question text, a
         "Question N of M" counter, four .answer-btn buttons (so they pick
         up the existing .answer-btn.is-being-read pulse from humphrey.css),
         a feedback row, and a Next button that surfaces after the answer. -->
    <div class="ha-today-questions" id="ha-today-questions" hidden>
      <div class="ha-today-q-counter" id="ha-today-q-counter"></div>
      <div class="ha-today-q-text" id="ha-today-q-text"></div>
      <div class="ha-today-choices" id="ha-today-choices"></div>
      <div class="ha-today-q-feedback" id="ha-today-q-feedback"></div>
      <button class="ha-today-q-next" id="ha-today-q-next" hidden>Next →</button>
    </div>
  </div>

  <style>
    /* v149: comprehension MCQ styling. Buttons use the .answer-btn class
       so they inherit the highlight-while-reading pulse from humphrey.css. */
    .ha-today-questions {
      margin-top: 28px; padding: 22px;
      background: rgba(20, 184, 212, 0.06);
      border: 1px solid rgba(20, 184, 212, 0.22);
      border-radius: 18px;
      scroll-margin-top: 20px;
    }
    .ha-today-q-counter {
      font: 600 13px/1.2 'Fredoka', sans-serif;
      color: #14b8d4; letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 10px;
    }
    .ha-today-q-text {
      font: 700 22px/1.35 'Fredoka', sans-serif;
      color: #1a3140; margin-bottom: 18px;
    }
    .ha-today-choices {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
      margin-bottom: 14px;
    }
    .ha-today-choices .answer-btn {
      background: #fff;
      color: #1a3140;
      border: 2px solid #14b8d4;
      border-radius: 12px;
      padding: 14px 16px;
      font: 600 16px/1.2 'Nunito', sans-serif;
      cursor: pointer;
      transition: transform 0.1s ease, background 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 2px 0 rgba(20, 184, 212, 0.35);
      text-align: center;
    }
    .ha-today-choices .answer-btn:hover { background: rgba(20, 184, 212, 0.08); }
    .ha-today-choices .answer-btn:active { transform: translateY(1px); box-shadow: 0 1px 0 rgba(20, 184, 212, 0.35); }
    .ha-today-choices .answer-btn:disabled { cursor: default; opacity: 0.7; }
    .ha-today-choices .answer-btn.is-correct {
      background: #2ec27e; color: #fff; border-color: #1f7a3a;
      box-shadow: 0 2px 0 #155a28;
    }
    .ha-today-choices .answer-btn.is-wrong {
      background: #ef4444; color: #fff; border-color: #b91c1c;
      box-shadow: 0 2px 0 #7a1414;
    }
    .ha-today-choices .answer-btn.show-correct {
      outline: 4px solid #ffd147; outline-offset: 2px;
    }
    .ha-today-q-feedback {
      min-height: 22px; text-align: center;
      font: 700 15px/1.3 'Fredoka', sans-serif;
      margin-bottom: 8px;
    }
    .ha-today-q-feedback.is-correct { color: #1f7a3a; }
    .ha-today-q-feedback.is-wrong   { color: #b91c1c; }
    .ha-today-q-next {
      display: block; margin: 4px auto 0;
      background: #14b8d4; color: #fff;
      border: none; border-radius: 999px;
      padding: 10px 22px; font: 700 14px/1 'Fredoka', sans-serif;
      letter-spacing: 0.04em; cursor: pointer;
      box-shadow: 0 3px 0 #0b6478;
    }
    .ha-today-q-next:active { transform: translateY(1px); box-shadow: 0 1px 0 #0b6478; }
    @media (max-width: 520px) {
      .ha-today-choices { grid-template-columns: 1fr; }
    }
  </style>

  <button class="humphrey-btn" id="humphreyBtn" aria-label="Talk to Miss Humphrey">
    <span class="humphrey-pulse"></span>
    <span class="humphrey-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="22" height="22"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg></span>
    <span class="humphrey-label">Ms. Humphrey</span>
  </button>

  <!-- Data + session controller -->
  <script src="data/story-templates.js"></script>
  <script src="data/grade2-vocab.js"></script>
  <script src="js/story-lab.js"></script>
  <script src="js/canvas.js"></script>

  <!-- Ms. Humphrey passive presence (corner portrait + speech bubble + Q&A) -->
  <script src="js/humphrey.js"></script>
  <script src="js/humphrey-listener.js"></script>
  <script src="js/humphrey-chat.js"></script>
  <script src="js/humphrey-memory.js"></script>
  <script src="js/humphrey-qna.js"></script>
  <script src="js/humphrey-choices.js"></script>

  <!-- Content-of-One engine (Swing 3) -->
  <script src="js/daily-content.js"></script>

  <script>
    if (window.HeroAcademy && window.HeroAcademy.Humphrey) {
      window.HeroAcademy.Humphrey.init({
        position: 'bottom-left',
        audioEnabled: true,
        debug: false,
        kidName: 'Nigel',
      });
    }
    // Update the header counter once the data files have loaded.
    document.addEventListener('DOMContentLoaded', function () {
      try {
        var raw = localStorage.getItem('ha_stories');
        var arr = raw ? JSON.parse(raw) : [];
        var el = document.getElementById('sl-count');
        if (el) el.textContent = arr.length || 0;
      } catch (e) {}
    });

    // ----- Today's Adventure surface -----
    (async function () {
      const card     = document.getElementById('ha-today-card');
      const titleEl  = document.getElementById('ha-today-title');
      const previewEl = document.getElementById('ha-today-preview');
      const ctaBtn   = document.getElementById('ha-today-cta');
      const reader   = document.getElementById('ha-today-reader');
      const closeBtn = document.getElementById('ha-today-reader-close');
      const rTitle   = document.getElementById('ha-today-reader-title');
      const rBody    = document.getElementById('ha-today-reader-body');
      // v149 surfaces
      const qWrap    = document.getElementById('ha-today-questions');
      const qCounter = document.getElementById('ha-today-q-counter');
      const qText    = document.getElementById('ha-today-q-text');
      const qChoices = document.getElementById('ha-today-choices');
      const qFeedback = document.getElementById('ha-today-q-feedback');
      const qNext    = document.getElementById('ha-today-q-next');

      if (!window.HeroAcademy || !window.HeroAcademy.DailyContent) return;
      const result = await window.HeroAcademy.DailyContent.get('story');
      if (!result || !result.payload || !result.payload.body) return;

      const s = result.payload;
      titleEl.textContent = s.title || "Today's Adventure";
      const firstPara = (s.body || '').split('\n\n')[0] || '';
      previewEl.textContent = firstPara;
      card.hidden = false;

      // Track the multi-choice session state so the close handler and the
      // Next button know what to do.
      let qSession = null;

      ctaBtn.addEventListener('click', function () {
        rTitle.textContent = s.title || "Today's Adventure";
        rBody.innerHTML = '';
        (s.body || '').split('\n\n').forEach(function (para) {
          if (!para.trim()) return;
          const p = document.createElement('p');
          p.textContent = para.trim();
          rBody.appendChild(p);
        });
        // Reset the question surface — it'll be populated in Phase B once
        // the body finishes reading.
        qWrap.hidden = true;
        qChoices.innerHTML = '';
        qFeedback.textContent = '';
        qFeedback.className = 'ha-today-q-feedback';
        qNext.hidden = true;

        reader.hidden = false;
        window.scrollTo(0, 0);
        window.HeroAcademy.DailyContent.markUsed('story');

        // v149 — two-phase read:
        //   Phase A: queue intro + body paragraphs as separate H.say calls.
        //   Phase B: when Phase A's last promise resolves, scroll the
        //            question surface into view and start the interactive
        //            multi-choice loop using HumphreyChoices.speakWithHighlights.
        // Falls back to v148 read-only behaviour for old-shape data (no
        // choices) — the cron has to regenerate today's story before the
        // interactive UI lights up.
        const H = window.HeroAcademy && window.HeroAcademy.Humphrey;
        if (!H || typeof H.say !== 'function') return;

        const bodyChunks = buildBodyChunks(s);
        let lastPromise = Promise.resolve();
        bodyChunks.forEach(function (chunk) {
          lastPromise = H.say('try-again-reading', {
            kidName: 'Nigel',
            text: chunk,
            expression: 'encouraging',
          });
        });

        // After the body, kick off Phase B.
        if (lastPromise && typeof lastPromise.then === 'function') {
          lastPromise.then(function () { startQuestionPhase(s); })
                     .catch(function () { startQuestionPhase(s); });
        } else {
          startQuestionPhase(s);
        }
      });

      // v149: split a paragraph or any long line into ≤450-char chunks on
      // sentence boundaries. The TTS proxy caps at 500 chars per request;
      // 450 leaves a margin for the punctuation we re-append.
      function splitForTts(text) {
        const MAX = 450;
        const t = String(text || '').trim();
        if (!t) return [];
        if (t.length <= MAX) return [t];
        const out = [];
        let buf = '';
        const sentences = t.match(/[^.!?]+[.!?]+|[^.!?]+$/g) || [t];
        sentences.forEach(function (s) {
          const sentence = s.trim();
          if (!sentence) return;
          if ((buf + ' ' + sentence).trim().length > MAX) {
            if (buf) out.push(buf.trim());
            if (sentence.length > MAX) {
              const words = sentence.split(/\s+/);
              let line = '';
              words.forEach(function (w) {
                if ((line + ' ' + w).trim().length > MAX) {
                  if (line) out.push(line.trim());
                  line = w;
                } else {
                  line = (line + ' ' + w).trim();
                }
              });
              buf = line;
            } else {
              buf = sentence;
            }
          } else {
            buf = (buf + ' ' + sentence).trim();
          }
        });
        if (buf) out.push(buf.trim());
        return out;
      }

      // v149: body-only chunks (intro + paragraphs). Questions are handled
      // by the interactive Phase B loop, not queued upfront.
      function buildBodyChunks(story) {
        const out = [];
        out.push("I wrote a story just for you today, Nigel. Listen along.");
        (story.body || '').split('\n\n').forEach(function (para) {
          splitForTts(para).forEach(function (c) { out.push(c); });
        });
        return out;
      }

      // -------- Phase B: interactive comprehension Q&A --------------------
      function startQuestionPhase(story) {
        const H = window.HeroAcademy && window.HeroAcademy.Humphrey;
        if (!H) return;

        const all = Array.isArray(story.comprehension_questions) ? story.comprehension_questions : [];
        // Only questions with proper MCQ shape go into the interactive flow.
        // Old-shape items (just q + a) fall back to v148 read-only behaviour.
        const mcq = all.filter(function (q) {
          return q && typeof q.q === 'string' &&
                 Array.isArray(q.choices) && q.choices.length >= 2 &&
                 typeof q.answer_index === 'number' &&
                 q.answer_index >= 0 && q.answer_index < q.choices.length;
        });

        if (mcq.length === 0) {
          // Backward compat: today's story (generated under the old schema)
          // has no choices. Queue the questions as text-only reads.
          if (all.length > 0) {
            H.say('try-again-reading', { kidName: 'Nigel', text: "Now let's think about it.", expression: 'encouraging' });
            all.forEach(function (q) {
              if (q && q.q) splitForTts(q.q).forEach(function (c) {
                H.say('try-again-reading', { kidName: 'Nigel', text: c, expression: 'encouraging' });
              });
            });
          }
          return;
        }

        qSession = { questions: mcq, idx: 0, answeredCorrect: 0 };
        qWrap.hidden = false;
        // Pull the question surface into view so Nigel knows where to look.
        setTimeout(function () {
          try { qWrap.scrollIntoView({ behavior: 'smooth', block: 'start' }); } catch (_) {}
        }, 250);
        // Brief redirect line so Nigel knows we're switching from reading
        // to thinking. Spoken FIRST, then the question fires after.
        H.say('try-again-reading', {
          kidName: 'Nigel',
          text: "Great listening, Nigel. Now look at the questions below — tap the right answer for each.",
          expression: 'encouraging',
        });
        presentQuestion();
      }

      function presentQuestion() {
        if (!qSession) return;
        const H = window.HeroAcademy && window.HeroAcademy.Humphrey;
        const HC = window.HeroAcademy && window.HeroAcademy.HumphreyChoices;
        const i = qSession.idx;
        const total = qSession.questions.length;
        if (i >= total) { finishQuestionPhase(); return; }
        const q = qSession.questions[i];

        qCounter.textContent = 'Question ' + (i + 1) + ' of ' + total;
        qText.textContent = q.q;
        qFeedback.textContent = '';
        qFeedback.className = 'ha-today-q-feedback';
        qNext.hidden = true;
        qChoices.innerHTML = '';

        q.choices.forEach(function (choice, choiceIdx) {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'answer-btn';
          btn.textContent = String(choice);
          btn.dataset.choiceIdx = String(choiceIdx);
          btn.addEventListener('click', function () { handleChoiceTap(choiceIdx, btn); });
          qChoices.appendChild(btn);
        });

        // Use HumphreyChoices.speakWithHighlights so each choice button
        // pulses while its TTS audio plays. Matches Discovery Dome's UX.
        if (HC && typeof HC.speakWithHighlights === 'function') {
          HC.speakWithHighlights({
            event: 'try-again-reading',
            questionText: q.q,
            choices: q.choices.map(String),
            container: '#ha-today-choices',
            choiceSelector: '.answer-btn',
            expression: 'encouraging',
          });
        } else if (H && typeof H.say === 'function') {
          // Fallback if humphrey-choices.js failed to load — just read
          // question + choices serially, no highlight.
          H.say('try-again-reading', { kidName: 'Nigel', text: q.q, expression: 'encouraging' });
          q.choices.forEach(function (c) {
            H.say('try-again-reading', { kidName: 'Nigel', text: String(c), expression: 'encouraging' });
          });
        }
      }

      function handleChoiceTap(pickedIdx, btn) {
        if (!qSession) return;
        const H = window.HeroAcademy && window.HeroAcademy.Humphrey;
        const HC = window.HeroAcademy && window.HeroAcademy.HumphreyChoices;
        // Cancel any in-flight choice readout so the next utterance comes
        // through cleanly without barging in mid-choice.
        try { if (HC && HC.cancel) HC.cancel(); } catch (_) {}

        const q = qSession.questions[qSession.idx];
        const correctIdx = q.answer_index;
        const btns = qChoices.querySelectorAll('.answer-btn');
        btns.forEach(function (b) { b.disabled = true; b.classList.remove('is-being-read'); });

        if (pickedIdx === correctIdx) {
          btn.classList.add('is-correct');
          qFeedback.textContent = "Yes — that's right!";
          qFeedback.className = 'ha-today-q-feedback is-correct';
          qSession.answeredCorrect++;
          if (H) {
            H.say('correct-answer-reading', {
              kidName: 'Nigel',
              text: "Yes — " + String(q.choices[correctIdx]) + ". That's right.",
              expression: 'cheering',
              priority: 'high',
            });
          }
        } else {
          btn.classList.add('is-wrong');
          // Highlight the correct one so he learns it.
          btns.forEach(function (b) {
            if (parseInt(b.dataset.choiceIdx, 10) === correctIdx) {
              b.classList.add('show-correct');
            }
          });
          qFeedback.textContent = "Not quite — the right answer is: " + String(q.choices[correctIdx]);
          qFeedback.className = 'ha-today-q-feedback is-wrong';
          if (H) {
            H.say('wrong-answer-reading', {
              kidName: 'Nigel',
              text: "Not quite. The answer is " + String(q.choices[correctIdx]) + ".",
              expression: 'concerned',
              priority: 'high',
            });
          }
        }
        // Surface the Next button so Nigel paces himself instead of being
        // auto-advanced mid-thought.
        qNext.textContent = (qSession.idx + 1 >= qSession.questions.length) ? 'See how I did →' : 'Next question →';
        qNext.hidden = false;
      }

      qNext.addEventListener('click', function () {
        if (!qSession) return;
        qSession.idx++;
        presentQuestion();
      });

      function finishQuestionPhase() {
        if (!qSession) return;
        const H = window.HeroAcademy && window.HeroAcademy.Humphrey;
        const got = qSession.answeredCorrect;
        const total = qSession.questions.length;
        qCounter.textContent = 'All done';
        qText.textContent = 'You answered ' + got + ' of ' + total + ' correctly.';
        qChoices.innerHTML = '';
        qFeedback.textContent = '';
        qFeedback.className = 'ha-today-q-feedback';
        qNext.hidden = true;
        if (H) {
          const text = (got === total)
            ? "Perfect score, Nigel. You were really listening."
            : ("Good work, Nigel. You got " + got + " out of " + total + ".");
          H.say('correct-answer-reading', {
            kidName: 'Nigel',
            text: text,
            expression: 'cheering',
            priority: 'high',
          });
        }
        qSession = null;
      }

      closeBtn.addEventListener('click', function () {
        reader.hidden = true;
        // v148: silence any in-flight or queued story read so closing the
        // overlay actually stops Humphrey.
        try {
          const HC = window.HeroAcademy && window.HeroAcademy.HumphreyChoices;
          if (HC && HC.cancel) HC.cancel();
        } catch (_) {}
        try {
          const H = window.HeroAcademy && window.HeroAcademy.Humphrey;
          if (H && typeof H.stop === 'function') H.stop();
        } catch (_) {}
        qSession = null;
      });
    })();
  </script>

  <script src="js/sw-register.js"></script>
  <script src="js/session-progress.js" defer></script>
  <script src="js/break-timer.js" defer></script>
</body>
