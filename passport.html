<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Explorer's Passport · Hero Academy</title>
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" href="/icons/icon-192.png">
<style>
  :root {
    --teal-deep: #0f4a4a;
    --teal-dark: #093232;
    --brass: #b8893d;
    --brass-light: #d4a85e;
    --brass-shadow: #7a5520;
    --cream: #fbf5e5;
    --ink: #2d1f0f;
    --ink-soft: #5a4a30;
    --rose-fill: #FCE2E2;
    --rose-edge: #E37777;
    --rose-text: #6E1E1E;
    --emerald-edge: #5DCAA5;
    --emerald-text: #085041;
    --purple-edge: #7F77DD;
    --purple-text: #3C3489;
    --amber-edge: #EF9F27;
    --amber-text: #633806;
    --slate-edge: #6b7280;
    --slate-text: #1f2937;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; overscroll-behavior: none; }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--teal-deep);
    color: var(--cream); min-height: 100vh; user-select: none;
  }
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Caveat:wght@700&display=swap');

  .topbar {
    height: 60px; background: var(--teal-dark);
    border-bottom: 2px solid var(--brass);
    display: flex; align-items: center; padding: 0 16px; gap: 12px;
  }
  .topbar .back {
    background: var(--cream); color: var(--ink); text-decoration: none;
    border-radius: 8px; padding: 8px 14px;
    font-weight: 600; font-size: 14px;
    box-shadow: 0 2px 0 var(--brass-shadow);
  }
  .topbar h1 {
    margin: 0; font-family: 'Cormorant Garamond', serif;
    font-size: 22px; font-weight: 600; color: var(--cream); letter-spacing: 0.04em;
  }
  .topbar .spacer { flex: 1; }
  .topbar .count {
    background: var(--brass-shadow); color: var(--cream);
    padding: 6px 12px; border-radius: 999px;
    border: 1px solid var(--brass); font-size: 13px;
    font-weight: 600;
  }

  .stage {
    padding: 20px 16px 80px;
    max-width: 720px; margin: 0 auto;
  }

  .intro {
    font-family: 'Caveat', cursive;
    font-size: 24px; color: var(--brass-light);
    margin: 0 0 6px;
  }
  .intro-sub {
    color: var(--cream); opacity: 0.85; font-size: 15px; margin: 0 0 18px;
  }

  /* ===== Theme filter chips ===== */
  .filters {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px;
  }
  .filter-chip {
    background: transparent; color: var(--cream);
    border: 2px solid var(--brass-shadow);
    padding: 6px 14px; border-radius: 999px;
    font-size: 13px; cursor: pointer; font-family: inherit;
    font-weight: 600;
  }
  .filter-chip.active {
    background: var(--brass); color: var(--ink); border-color: var(--brass);
  }
  .filter-chip:active { transform: scale(0.96); }

  /* ===== Stamps grid ===== */
  .stamps-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 14px;
  }
  .stamp-card {
    background: var(--cream); border-radius: 14px;
    padding: 16px 12px 14px;
    text-align: center; cursor: pointer;
    border: 2px solid var(--brass);
    box-shadow: 0 3px 0 var(--brass-shadow);
    font-family: inherit;
    transition: transform 0.12s ease;
  }
  .stamp-card:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--brass-shadow); }
  .stamp-card .stamp-circle {
    width: 88px; height: 88px; margin: 0 auto 10px;
    border-radius: 50%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: var(--rose-text); border: 4px solid var(--rose-edge);
    background: var(--cream);
    transform: rotate(-8deg);
    box-shadow:
      inset 0 0 0 2px var(--cream),
      inset 0 0 0 4px var(--rose-edge),
      inset 0 0 14px rgba(110, 30, 30, 0.16);
    font-family: 'Cormorant Garamond', serif;
  }
  .stamp-circle .lbl {
    font-size: 16px; font-weight: 700; letter-spacing: 0.06em;
    line-height: 1; padding: 0 4px;
    word-break: break-word;
  }
  .stamp-card .stamp-topic {
    color: var(--ink); font-size: 13px; font-weight: 600;
    line-height: 1.3; margin: 4px 4px 2px;
  }
  .stamp-card .stamp-date {
    color: var(--ink-soft); font-size: 11px; margin-top: 4px;
  }
  .stamp-card[data-theme="historical_figures"] .stamp-circle { border-color: var(--rose-edge); color: var(--rose-text); }
  .stamp-card[data-theme="maryland_history"] .stamp-circle  { border-color: var(--brass);     color: var(--brass-shadow); }
  .stamp-card[data-theme="us_history"] .stamp-circle        { border-color: var(--purple-edge); color: var(--purple-text); }
  .stamp-card[data-theme="us_geography"] .stamp-circle      { border-color: var(--emerald-edge); color: var(--emerald-text); }
  .stamp-card[data-theme="world_geography"] .stamp-circle   { border-color: var(--emerald-edge); color: var(--emerald-text); }
  .stamp-card[data-theme="civics"] .stamp-circle            { border-color: var(--slate-edge); color: var(--slate-text); }
  .stamp-card[data-theme="culture_holidays"] .stamp-circle  { border-color: var(--amber-edge); color: var(--amber-text); }
  .stamp-card[data-theme="science_of_place"] .stamp-circle  { border-color: var(--emerald-edge); color: var(--emerald-text); }

  /* ===== Empty state ===== */
  .empty {
    text-align: center; padding: 60px 20px;
    color: var(--cream);
  }
  .empty-glyph {
    font-size: 72px; margin-bottom: 10px; opacity: 0.6;
  }
  .empty h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; margin: 0 0 8px;
  }
  .empty p { opacity: 0.8; margin: 0 0 16px; font-size: 15px; }
  .empty a.cta {
    display: inline-block; background: var(--brass); color: var(--ink);
    padding: 12px 20px; border-radius: 12px; font-weight: 700;
    text-decoration: none; box-shadow: 0 3px 0 var(--brass-shadow);
  }

  /* ===== Loading ===== */
  .loading {
    text-align: center; padding: 80px 20px; color: var(--cream); opacity: 0.7;
  }
  .loading-spinner {
    width: 36px; height: 36px;
    border: 4px solid rgba(212, 168, 94, 0.2);
    border-top-color: var(--brass-light);
    border-radius: 50%; margin: 0 auto 14px;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== Sheet (stamp details) ===== */
  .sheet {
    position: fixed; inset: 0;
    background: rgba(8, 30, 30, 0.78);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 100; opacity: 0; pointer-events: none;
    transition: opacity 0.22s ease;
  }
  .sheet.open { opacity: 1; pointer-events: auto; }
  .sheet-card {
    background: var(--teal-deep); color: var(--cream);
    width: 100%; max-width: 580px;
    max-height: 88vh; overflow-y: auto;
    border-radius: 18px 18px 0 0;
    padding: 22px 22px 38px;
    transform: translateY(40px);
    transition: transform 0.25s cubic-bezier(0.2, 0.8, 0.3, 1);
    border-top: 2px solid var(--brass);
  }
  .sheet.open .sheet-card { transform: translateY(0); }
  .sheet-header {
    display: flex; align-items: flex-start; gap: 14px; margin-bottom: 14px;
  }
  .sheet-stamp-mini {
    width: 64px; height: 64px; border-radius: 50%;
    background: var(--cream); color: var(--rose-text);
    border: 3px solid var(--rose-edge);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px; font-weight: 700; letter-spacing: 0.04em;
    text-align: center; padding: 4px;
    flex-shrink: 0;
    transform: rotate(-8deg);
  }
  .sheet-head-text { flex: 1; }
  .sheet-topic {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; font-weight: 700; margin: 0; color: var(--cream);
  }
  .sheet-meta {
    color: var(--brass-light); font-size: 13px; margin: 4px 0 0;
  }
  .sheet-close {
    background: transparent; border: none; color: var(--cream);
    font-size: 24px; cursor: pointer; padding: 0 8px;
    line-height: 1;
  }
  .sheet-section { margin-top: 18px; }
  .sheet-section h3 {
    font-family: 'Caveat', cursive;
    font-size: 20px; color: var(--brass-light); margin: 0 0 6px;
  }
  .sheet-section p {
    margin: 0; line-height: 1.55; font-size: 15px; color: var(--cream);
  }
  .sheet-wonder {
    background: var(--teal-dark); border-left: 3px solid var(--brass);
    padding: 12px 14px; border-radius: 0 10px 10px 0;
    margin-bottom: 10px;
  }
  .sheet-wonder-title {
    font-weight: 700; font-size: 14px; color: var(--cream);
    display: flex; gap: 8px; align-items: center;
    margin-bottom: 6px;
  }
  .sheet-wonder-fact {
    font-size: 14px; line-height: 1.5; color: var(--cream); opacity: 0.92;
  }
</style>
</head>
<body>
  <header class="topbar">
    <a class="back" href="/explorers-hall.html">← Explorer's Hall</a>
    <h1>Passport</h1>
    <div class="spacer"></div>
    <div class="count" id="stampCount">—</div>
  </header>

  <main class="stage">
    <p class="intro">Your Explorer's Passport</p>
    <p class="intro-sub">Every expedition you complete earns a stamp. Tap any stamp to revisit it.</p>

    <div class="filters" id="filters" hidden></div>

    <div id="content">
      <div class="loading">
        <div class="loading-spinner"></div>
        <p>Opening your passport…</p>
      </div>
    </div>
  </main>

  <!-- Detail sheet -->
  <div class="sheet" id="sheet" aria-hidden="true">
    <div class="sheet-card" id="sheetCard"></div>
  </div>

  <script src="/js/sw-register.js"></script>
  <script src="/js/telemetry.js"></script>
  <script>
  (function () {
    'use strict';

    var NIGEL_ID = '2e0e51c5-f120-4152-8aa1-041eeecc8165';

    var THEME_LABELS = {
      historical_figures: 'People',
      maryland_history: 'Maryland',
      us_history: 'U.S. History',
      us_geography: 'U.S. Places',
      world_geography: 'World',
      civics: 'How it Works',
      culture_holidays: 'Holidays',
      science_of_place: 'Science',
    };

    var $ = function (id) { return document.getElementById(id); };
    function esc(s) {
      if (s == null) return '';
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    var state = {
      stamps: [],
      activeTheme: 'all',
    };

    function renderEmpty() {
      $('content').innerHTML =
        '<div class="empty">' +
        '  <div class="empty-glyph" aria-hidden="true">🛂</div>' +
        '  <h2>Your passport is fresh</h2>' +
        '  <p>Complete today\'s expedition in Explorer\'s Hall to earn your first stamp.</p>' +
        '  <a class="cta" href="/explorers-hall.html">Open Explorer\'s Hall →</a>' +
        '</div>';
    }

    function renderFilters(stamps) {
      var themesPresent = {};
      stamps.forEach(function (s) { themesPresent[s.theme] = true; });
      var keys = Object.keys(themesPresent);
      if (keys.length <= 1) {
        $('filters').hidden = true;
        return;
      }
      var html = '<button class="filter-chip ' + (state.activeTheme === 'all' ? 'active' : '') + '" data-theme="all">All</button>';
      keys.forEach(function (t) {
        html += '<button class="filter-chip ' + (state.activeTheme === t ? 'active' : '') + '" data-theme="' + esc(t) + '">' +
          esc(THEME_LABELS[t] || t) + '</button>';
      });
      $('filters').innerHTML = html;
      $('filters').hidden = false;
      $('filters').querySelectorAll('[data-theme]').forEach(function (btn) {
        btn.addEventListener('click', function () {
          state.activeTheme = btn.getAttribute('data-theme');
          renderFilters(stamps);
          renderStamps(stamps);
        });
      });
    }

    function fmtDate(s) {
      if (!s) return '';
      try {
        var d = new Date(s);
        if (isNaN(d.getTime())) return s.slice(0, 10);
        return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      } catch (_) { return s.slice(0, 10); }
    }

    function renderStamps(stamps) {
      var filtered = state.activeTheme === 'all'
        ? stamps
        : stamps.filter(function (s) { return s.theme === state.activeTheme; });

      if (filtered.length === 0) {
        $('content').innerHTML =
          '<div class="empty">' +
          '  <p style="opacity:0.7">No stamps in this category yet.</p>' +
          '</div>';
        return;
      }

      var html = '<div class="stamps-grid">';
      filtered.forEach(function (s, i) {
        var pl = s.payload || {};
        var comp = pl.completion || {};
        var lbl = comp.stamp_label || (s.topic || '').toUpperCase().slice(0, 12);
        var sub = comp.stamp_subtitle || '';
        html += [
          '<button class="stamp-card" data-stamp-idx="' + i + '" data-theme="' + esc(s.theme) + '">',
          '  <div class="stamp-circle">',
          '    <div class="lbl">' + esc(lbl) + '</div>',
          (sub ? '    <div style="font-size:9px;opacity:0.85;margin-top:2px">' + esc(sub) + '</div>' : ''),
          '  </div>',
          '  <div class="stamp-topic">' + esc(s.topic || '') + '</div>',
          '  <div class="stamp-date">' + esc(fmtDate(s.stamped_at || s.expedition_date)) + '</div>',
          '</button>',
        ].join('');
      });
      html += '</div>';
      $('content').innerHTML = html;

      $('content').querySelectorAll('[data-stamp-idx]').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var idx = parseInt(btn.getAttribute('data-stamp-idx'), 10);
          openSheet(filtered[idx]);
        });
      });
    }

    function openSheet(stamp) {
      if (!stamp) return;
      var pl = stamp.payload || {};
      var d = pl.discovery || {};
      var conn = pl.connection || {};
      var comp = pl.completion || {};
      var wonders = pl.wonders || [];

      var wondersHtml = wonders.map(function (w) {
        return [
          '<div class="sheet-wonder">',
          '  <div class="sheet-wonder-title">',
          '    <span>' + esc(w.icon || '✨') + '</span>',
          '    <span>' + esc(w.title || '') + '</span>',
          '  </div>',
          '  <p class="sheet-wonder-fact">' + esc(w.fact || '') + '</p>',
          '</div>',
        ].join('');
      }).join('');

      $('sheetCard').innerHTML = [
        '<div style="display:flex;justify-content:space-between;align-items:flex-start">',
        '  <div></div>',
        '  <button class="sheet-close" data-close>×</button>',
        '</div>',
        '<div class="sheet-header">',
        '  <div class="sheet-stamp-mini">' + esc(comp.stamp_label || '') + '</div>',
        '  <div class="sheet-head-text">',
        '    <h2 class="sheet-topic">' + esc(stamp.topic || '') + '</h2>',
        '    <p class="sheet-meta">' + esc(THEME_LABELS[stamp.theme] || stamp.theme) +
              ' · ' + esc(fmtDate(stamp.stamped_at || stamp.expedition_date)) + '</p>',
        '  </div>',
        '</div>',
        (d.intro ? '<div class="sheet-section"><h3>What it was</h3><p>' + esc(d.intro) + '</p></div>' : ''),
        (wonders.length ? '<div class="sheet-section"><h3>What you learned</h3>' + wondersHtml + '</div>' : ''),
        (conn.text ? '<div class="sheet-section"><h3>What it meant for you</h3><p>' + esc(conn.text) + '</p></div>' : ''),
      ].join('');

      $('sheet').classList.add('open');
      $('sheet').setAttribute('aria-hidden', 'false');
      $('sheetCard').querySelector('[data-close]').addEventListener('click', closeSheet);
    }

    function closeSheet() {
      $('sheet').classList.remove('open');
      $('sheet').setAttribute('aria-hidden', 'true');
    }

    $('sheet').addEventListener('click', function (e) {
      if (e.target === $('sheet')) closeSheet();
    });

    function boot() {
      if (!window.HeroAcademy || !HeroAcademy.Telemetry || !HeroAcademy.Telemetry.rpc) {
        $('content').innerHTML = '<div class="empty"><p>Connecting to Hero Academy…</p></div>';
        setTimeout(boot, 300);
        return;
      }
      HeroAcademy.Telemetry.rpc('ha_list_stamps', { p_child_id: NIGEL_ID, p_limit: 200 })
        .then(function (r) { return r.ok ? r.json() : Promise.reject(new Error('rpc ' + r.status)); })
        .then(function (data) {
          var stamps = (data && data.stamps) || [];
          var count = (data && typeof data.count === 'number') ? data.count : stamps.length;
          $('stampCount').textContent = String(count);
          state.stamps = stamps;
          if (stamps.length === 0) {
            renderEmpty();
            return;
          }
          renderFilters(stamps);
          renderStamps(stamps);
        })
        .catch(function (e) {
          console.error('[passport] load failed:', e);
          $('content').innerHTML = '<div class="empty"><p>Couldn\'t open your passport: ' + esc(String(e.message || e)) + '</p></div>';
        });
    }

    if (document.readyState !== 'loading') boot();
    else document.addEventListener('DOMContentLoaded', boot);
  })();
  </script>
</body>
</html>
