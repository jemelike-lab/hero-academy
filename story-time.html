<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#fed7aa">
<title>Story Time · Hero Academy</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/humphrey.css">
<link rel="manifest" href="manifest.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@600;700&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;height:100%;width:100%;overflow-x:hidden;}
  /* v174b: ensure [hidden] attribute always wins over .st-loading/.st-stage display:flex */
  [hidden]{display:none!important;}
  body{padding-top:env(safe-area-inset-top,0px);padding-bottom:env(safe-area-inset-bottom,0px);min-height:100dvh;display:flex;flex-direction:column;}

  /* Header */
  .st-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;z-index:10;flex-wrap:wrap;gap:8px;}
  .st-back{background:rgba(0,0,0,0.4);border:2px solid var(--border-light);border-radius:50px;color:#1e293b;padding:8px 16px;font:600 14px var(--font-display);text-decoration:none;display:flex;align-items:center;gap:6px;transition:background .2s;}
  .st-back:hover{background:rgba(255,255,255,0.12);}
  .st-title-wrap{font-family:var(--font-display);font-weight:700;font-size:18px;letter-spacing:0.04em;color:#1e293b;text-align:center;}
  .st-title-wrap small{display:block;font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--magenta-bright);font-weight:600;margin-top:2px;}
  .st-counter{font-family:var(--font-display);font-weight:600;font-size:14px;color:var(--gold-text);background:rgba(0,0,0,0.35);border:1px solid var(--border-light);border-radius:50px;padding:6px 12px;}

  /* Loading state */
  .st-loading{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
  .st-loading-dot{width:14px;height:14px;border-radius:50%;background:var(--magenta);animation:st-dots 1.2s ease-in-out infinite;}
  .st-loading p{font-family:var(--font-display);font-weight:600;font-size:16px;color:var(--text-dim);}
  @keyframes st-dots{0%,80%,100%{transform:scale(0.6);opacity:0.4;}40%{transform:scale(1.2);opacity:1;}}

  /* Stage */
  .st-stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:8px 18px 36px;gap:18px;position:relative;}

  .st-passage-title{font-family:var(--font-display);font-weight:700;font-size:22px;color:var(--gold-text);letter-spacing:0.06em;text-align:center;}

  /* Full passage with current-sentence highlight */
  .st-passage{background:linear-gradient(135deg,rgba(255,255,255,0.08),rgba(255,255,255,0.03));border:1px solid var(--border-light);border-radius:24px;padding:20px 24px;max-width:680px;font-family:var(--font-body);font-weight:700;font-size:20px;line-height:1.6;color:var(--text-dim);}
  .st-sentence{transition:color .3s;}
  .st-sentence.done{color:var(--emerald-bright);}
  .st-sentence.current{color:#1e293b;background:linear-gradient(180deg,transparent 55%,rgba(236,72,153,0.30) 55%,rgba(236,72,153,0.30) 95%,transparent 95%);padding:0 2px;border-radius:4px;}

  /* Big current-sentence card — what kid actually reads */
  .st-current-card{background:linear-gradient(135deg,rgba(255,255,255,0.10),rgba(255,255,255,0.04));border:2px solid var(--magenta);border-radius:28px;padding:24px 24px;max-width:680px;text-align:center;box-shadow:0 12px 32px rgba(236,72,153,0.25);}
  .st-current{font-family:var(--font-display);font-weight:700;font-size:clamp(28px,5.5vw,42px);line-height:1.35;background:linear-gradient(135deg,var(--orange),var(--magenta) 50%,var(--violet));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  .st-current .st-word-err{background:rgba(239,68,68,0.30);border-bottom:3px solid var(--red-bright);border-radius:6px;padding:0 4px;-webkit-text-fill-color:#1e293b;color:#1e293b;}

  /* Mic + Done buttons */
  .st-action-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;justify-content:center;}
  .st-mic-btn{background:linear-gradient(135deg,var(--magenta),var(--orange));border:none;color:#1e293b;font-family:var(--font-display);font-weight:700;font-size:20px;padding:16px 32px;border-radius:50px;cursor:pointer;box-shadow:0 8px 28px rgba(236,72,153,0.5),inset 0 -3px 0 rgba(0,0,0,0.18);min-width:220px;transition:transform .15s var(--ease-bounce),box-shadow .2s;display:inline-flex;align-items:center;justify-content:center;gap:8px;}
  .st-mic-btn:hover:not(:disabled){transform:translateY(-2px);}
  .st-mic-btn:active:not(:disabled){transform:translateY(1px);}
  .st-mic-btn:disabled{opacity:0.55;cursor:not-allowed;}
  .st-mic-btn.listening{background:linear-gradient(135deg,var(--cyan),var(--electric));animation:st-pulse 1.2s ease-in-out infinite;}
  .st-mic-btn.thinking{background:linear-gradient(135deg,#7b6cf2,#a855f7);}
  .st-mic-btn.passed{background:linear-gradient(135deg,var(--emerald),#42d59c);}
  .st-mic-btn.failed{background:linear-gradient(135deg,var(--orange),var(--gold));}
  @keyframes st-pulse{0%,100%{box-shadow:0 8px 28px rgba(56,204,234,0.45),0 0 0 0 rgba(56,204,234,0.55);}50%{box-shadow:0 8px 28px rgba(56,204,234,0.45),0 0 0 20px rgba(56,204,234,0);}}

  /* v174b: read-along word highlight. Each .st-word gets briefly highlighted
     as TTS plays. Visual fluency-by-example. */
  .st-word { transition: background .15s, color .15s; padding: 0 2px; border-radius: 4px; }
  .st-word.reading {
    background: linear-gradient(135deg, rgba(245, 158, 11, 0.55), rgba(236, 72, 153, 0.55));
    color:#1e293b;
    box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.30);
    border-radius: 6px;
  }
  .st-word.done { color: var(--emerald-bright, #6ee7b7); }

  /* v174b: MC comprehension panel. Appears after the read-along. */
  .st-mc-panel {
    background: linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
    border: 2px solid rgba(168, 85, 247, 0.4);
    border-radius: 24px; padding: 28px 28px;
    max-width: 720px; margin: 16px auto;
    box-shadow: 0 8px 28px rgba(168, 85, 247, 0.18);
  }
  .st-mc-title {
    color: var(--gold-text); font: 700 18px/1.3 'Fredoka', system-ui, sans-serif;
    margin: 0 0 12px 0; text-align: center; letter-spacing: 0.04em;
  }
  .st-mc-question {
    color: #1e293b; font: 700 24px/1.4 'Fredoka', system-ui, sans-serif;
    margin: 0 0 18px 0; text-align: center;
  }
  .st-mc-options { display: grid; gap: 10px; margin-bottom: 12px; }
  .st-mc-option {
    background: linear-gradient(180deg, rgba(255,255,255,0.92), rgba(255,255,255,0.78));
    color: #1e293b; border: 2px solid rgba(91,33,182,0.22);
    border-radius: 14px; padding: 14px 18px;
    font: 600 18px/1.3 'Fredoka', system-ui, sans-serif;
    cursor: pointer; transition: transform .1s, border-color .15s, background .15s;
    text-align: left;
  }
  .st-mc-option:hover:not(:disabled) { border-color: #a855f7; transform: translateY(-1px); }
  .st-mc-option:disabled { opacity: 0.6; cursor: not-allowed; }
  .st-mc-option.correct { background: linear-gradient(135deg, #16a34a, #22c55e); border-color: #16a34a; }
  .st-mc-option.wrong   { background: linear-gradient(135deg, #b91c1c, #dc2626); border-color: #b91c1c; opacity: 0.85; }
  .st-mc-option.reveal  { background: linear-gradient(135deg, #d97706, #f59e0b); border-color: #d97706; box-shadow: 0 0 0 3px rgba(245,158,11,0.4); }
  .st-mc-feedback { color: #e6e9f2; font: 600 16px/1.4 'Fredoka', system-ui, sans-serif; margin: 8px 0; min-height: 22px; text-align: center; }
  .st-mc-feedback.correct { color: #6ee7b7; }
  .st-mc-feedback.hint    { color: #92400e; }
  .st-mc-feedback.reveal  { color: #b45309; }
  .st-mc-replay {
    background: rgba(255,255,255,0.08); color: #e6e9f2;
    border: 1px solid rgba(255,255,255,0.18); border-radius: 12px;
    padding: 10px 16px; font: 600 14px/1 'Fredoka'; cursor: pointer; display: block; margin: 8px auto 0;
  }
  .st-mc-replay:hover { background: rgba(255,255,255,0.14); }

  .st-done-btn{background:rgba(255,255,255,0.95);color:var(--bg-deep);border:none;font-family:var(--font-display);font-weight:700;font-size:16px;padding:14px 24px;border-radius:50px;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,0.30);}
  .st-done-btn:hover{transform:translateY(-1px);}
  .st-tryagain-btn{background:rgba(0,0,0,0.4);border:2px solid var(--gold);color:var(--gold-text);font-family:var(--font-display);font-weight:700;font-size:15px;padding:10px 24px;border-radius:50px;cursor:pointer;}
  .st-tryagain-btn:hover{background:rgba(255,209,71,0.18);}

  /* Status */
  .st-status{font-family:var(--font-body);font-weight:600;font-size:15px;color:var(--text-dim);max-width:600px;text-align:center;line-height:1.5;padding:0 12px;min-height:22px;}
  .st-status--pass{color:var(--emerald-bright);}
  .st-status--fail{color:var(--orange-bright);}
  .st-status--error{color:var(--red-bright);}
  .st-status--hint{color:var(--text-dim);}

  /* End card */
  .st-end-card{background:linear-gradient(135deg,rgba(255,255,255,0.10),rgba(255,255,255,0.04));border:2px solid var(--gold);border-radius:32px;padding:36px 28px;max-width:480px;margin:40px auto;text-align:center;box-shadow:0 16px 48px rgba(255,209,71,0.25);}
  .st-end-title{font-family:var(--font-display);font-weight:700;font-size:30px;background:linear-gradient(135deg,var(--orange),var(--magenta));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:18px;}
  .st-end-line{font-family:var(--font-body);font-weight:700;font-size:17px;color:#1e293b;margin:8px 0;}
  .st-end-line strong{color:var(--gold-text);font-size:22px;font-family:var(--font-display);}
  .st-end-line--soft{color:var(--text-dim);font-size:14px;font-weight:600;margin-top:14px;line-height:1.5;}
  .st-end-actions{display:flex;gap:12px;justify-content:center;margin-top:24px;flex-wrap:wrap;}
  .st-end-restart{background:linear-gradient(135deg,var(--magenta),var(--orange));border:none;color:#1e293b;font-family:var(--font-display);font-weight:700;font-size:15px;padding:12px 26px;border-radius:50px;cursor:pointer;box-shadow:0 6px 20px rgba(236,72,153,0.45);}
  .st-end-home{background:transparent;border:2px solid var(--border-light);color:#1e293b;font-family:var(--font-display);font-weight:600;font-size:15px;padding:10px 24px;border-radius:50px;text-decoration:none;display:inline-block;}
</style>
</head>
<body>

  <header class="st-header">
    <a href="index.html" class="st-back">← Back</a>
    <div class="st-title-wrap">Story Time<small>Read aloud with Ms. Humphrey</small></div>
    <div class="st-counter" id="st-counter">Loading…</div>
  </header>

  <div class="st-loading" id="st-loading">
    <div class="st-loading-dot"></div>
    <p>Ms. Humphrey is writing you a story…</p>
  </div>

  <main class="st-stage" id="st-stage" hidden>
    <div class="st-passage-title" id="st-title">…</div>
    <div class="st-passage" id="st-passage"></div>
    <div class="st-current-card">
      <div class="st-current" id="st-sentence-current">…</div>
    </div>
    <div class="st-action-row">
      <button class="st-mic-btn" id="st-mic-btn" type="button">
        <span class="st-mic-label">🎤 Read it</span>
      </button>
      <button class="st-done-btn" id="st-done-btn" type="button" hidden>✓ Done</button>
    </div>
    <div class="st-status" id="st-status" hidden></div>
    <button class="st-tryagain-btn" id="st-tryagain-btn" type="button" hidden>Try again</button>
  </main>

  <section class="st-end-card" id="st-end-card" hidden>
    <div class="st-end-title">Great reading!</div>
    <div id="st-end-stats"></div>
    <div class="st-end-actions">
      <button class="st-end-restart" id="st-restart-btn" type="button">Read another</button>
      <a class="st-end-home" href="index.html">Back to Hero Academy</a>
    </div>
  </section>

  <!-- v174b: read-along + MC. No microphone, no listener, no /api/humphrey/assess-*. -->
  <script src="js/humphrey.js"></script>
  <script src="js/humphrey-memory.js"></script>

  <!-- Word list needed for targetWords in passage generation -->
  <script src="js/word-lists.js"></script>
  <!-- Story Time session -->
  <script src="js/story-time.js"></script>

  <script>
    if (window.HeroAcademy && window.HeroAcademy.Humphrey) {
      // No welcomeEvent — Story Time's first say() reads the personalized
      // passage intro ("I wrote you a story today..."), which serves as the
      // welcome. Catalog welcome would duplicate.
      window.HeroAcademy.Humphrey.init({
        position: 'bottom-left',
        audioEnabled: true,
        debug: false,
        kidName: 'Nigel',
      });
    }
  </script>
  <script src="js/telemetry.js"></script>
  <script src="js/sw-register.js"></script>
  <script src="js/session-progress.js" defer></script>
  <script src="js/break-timer.js" defer></script>
</body>
</html>
