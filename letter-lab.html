<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="theme-color" content="#1a1554">
  <title>Letter Lab · Hero Academy</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/canvas.css">
  <link rel="stylesheet" href="css/humphrey.css">
  <link rel="stylesheet" href="css/letter-lab.css">
</head>
<body class="ll-body">

  <header class="ll-header">
    <button class="back-btn" data-ll-back type="button" aria-label="Back to home">← Home</button>
    <h1 class="ll-title">✍️ Letter Lab</h1>
    <div class="ll-progress" data-ll-progress aria-live="polite">1 / 3</div>
  </header>

  <main class="ll-main">

    <!-- v104: Target character is HIDDEN — Nigel must draw from memory after
         hearing Ms. Humphrey say it. The "Say it again" button lets him hear
         the prompt repeated if he missed it. The target letter element is
         intentionally removed; there's no visual reveal until the demo
         phase (after a wrong attempt). -->
    <section class="ll-prompt" data-ll-prompt-panel>
      <div class="ll-prompt-meta">
        <img class="ll-humphrey" src="assets/humphrey/humphrey_base_256.webp"
             alt="Ms. Humphrey" width="80" height="80">
        <div class="ll-prompt-text" data-ll-prompt-text>
          👂 Listen to Ms. Humphrey, then draw what she says.
        </div>
      </div>
      <button class="ll-btn ll-btn--ghost ll-replay" data-ll-replay type="button">
        🔊 Say it again
      </button>
    </section>

    <!-- Drawing canvas (mounted by canvas.js) -->
    <section class="ll-canvas-wrap" data-ll-canvas-wrap></section>

    <!-- Drawing actions -->
    <div class="ll-actions" data-ll-action-bar>
      <button class="ll-btn ll-btn--ghost" type="button" data-ll-undo>↶ Undo</button>
      <button class="ll-btn ll-btn--ghost" type="button" data-ll-clear>🗑️ Clear</button>
      <button class="ll-btn ll-btn--primary" type="button" data-ll-submit>✨ Show Ms. Humphrey</button>
    </div>

    <!-- Result phase (after submit) -->
    <section class="ll-result" data-ll-result hidden>
      <div class="ll-result-spinner" data-ll-spinner hidden>
        <div class="ll-spinner-ring" aria-hidden="true"></div>
        <p class="ll-spinner-text">Ms. Humphrey is looking at your letter…</p>
      </div>
      <div class="ll-result-card" data-ll-reaction-card hidden>
        <img class="ll-humphrey ll-humphrey--big" src="assets/humphrey/humphrey_base_512.webp"
             alt="Ms. Humphrey" width="128" height="128"
             data-ll-humphrey-portrait>
        <p class="ll-result-text" data-ll-reaction></p>
        <div class="ll-result-actions">
          <!-- v102: struggle-recovery flow. After first wrong attempt, Watch
               appears instead of Next; tap Watch → Humphrey draws the target
               on her canvas layer → "My turn again" button clears and lets
               him retry the same target. On second attempt, just advance. -->
          <!-- v107: Try Again gets one more attempt before Watch is offered.
               Wrong on attempt 1 -> Try Again + Skip
               Wrong on attempt 2 -> Watch (demo) + Skip
               After demo + retry -> Next (no more options) -->
          <button class="ll-btn ll-btn--primary" type="button" data-ll-tryagain hidden>🖊️ Try Again</button>
          <button class="ll-btn ll-btn--primary" type="button" data-ll-watch hidden>👁️ Watch Ms. Humphrey draw it</button>
          <button class="ll-btn ll-btn--ghost"   type="button" data-ll-skip  hidden>Skip →</button>
          <button class="ll-btn ll-btn--primary" type="button" data-ll-retry hidden>🖊️ My turn again</button>
          <button class="ll-btn ll-btn--primary" type="button" data-ll-next  hidden>Next →</button>
          <button class="ll-btn ll-btn--primary" type="button" data-ll-finish hidden>🎉 All done!</button>
        </div>
      </div>
    </section>

  </main>

  <!-- Scripts: shared utilities → full Humphrey stack → Letter Lab activity.
       The full Humphrey stack matches what every other zone loads so Nigel
       can also tap her portrait to ask questions while practicing. -->
  <script src="js/telemetry.js"></script>
  <script src="js/canvas.js"></script>
  <script src="js/letter-strokes.js"></script>
  <script src="js/humphrey.js"></script>
  <script src="js/humphrey-listener.js"></script>
  <script src="js/humphrey-chat.js"></script>
  <script src="js/humphrey-memory.js"></script>
  <script src="js/humphrey-qna.js"></script>
  <script src="js/humphrey-choices.js"></script>

  <!-- v101: explicit init() so Humphrey actually mounts. Without this,
       say() calls queue but never play (pump() bails on !state.mounted).
       letter-lab.js handles the first speak via humphreySay() inside
       renderCurrentLetter, so no welcomeEvent is needed here. -->
  <script>
    if (window.HeroAcademy && window.HeroAcademy.Humphrey) {
      window.HeroAcademy.Humphrey.init({
        position: 'bottom-left',
        audioEnabled: true,
        debug: false,
        kidName: 'Nigel',
      });
    }
  </script>

  <script src="js/letter-lab.js"></script>
  <script src="js/sw-register.js"></script>
  <script src="js/session-progress.js" defer></script>
  <script src="js/break-timer.js" defer></script>
</body>
</html>
