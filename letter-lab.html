<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="theme-color" content="#1a1554">
  <title>Letter Lab · Hero Academy</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/canvas.css">
  <link rel="stylesheet" href="css/humphrey.css">
  <link rel="stylesheet" href="css/letter-lab.css">
</head>
<body class="ll-body">

  <header class="ll-header">
    <button class="back-btn" data-ll-back type="button" aria-label="Back to home">← Home</button>
    <h1 class="ll-title">✍️ Letter Lab</h1>
    <div class="ll-progress" data-ll-progress aria-live="polite">1 / 3</div>
  </header>

  <main class="ll-main">

    <!-- Prompt: target letter + Humphrey portrait -->
    <section class="ll-prompt" data-ll-prompt-panel>
      <div class="ll-prompt-meta">
        <img class="ll-humphrey" src="assets/humphrey/humphrey_base_256.webp"
             alt="Ms. Humphrey" width="80" height="80">
        <div class="ll-prompt-text" data-ll-prompt-text>
          Write a big capital <strong data-ll-prompt-letter>B</strong> for me.
        </div>
      </div>
      <div class="ll-target-letter" data-ll-target aria-hidden="true">B</div>
    </section>

    <!-- Drawing canvas (mounted by canvas.js) -->
    <section class="ll-canvas-wrap" data-ll-canvas-wrap></section>

    <!-- Drawing actions -->
    <div class="ll-actions" data-ll-action-bar>
      <button class="ll-btn ll-btn--ghost" type="button" data-ll-undo>↶ Undo</button>
      <button class="ll-btn ll-btn--ghost" type="button" data-ll-clear>🗑️ Clear</button>
      <button class="ll-btn ll-btn--primary" type="button" data-ll-submit>✨ Show Ms. Humphrey</button>
    </div>

    <!-- Result phase (after submit) -->
    <section class="ll-result" data-ll-result hidden>
      <div class="ll-result-spinner" data-ll-spinner hidden>
        <div class="ll-spinner-ring" aria-hidden="true"></div>
        <p class="ll-spinner-text">Ms. Humphrey is looking at your letter…</p>
      </div>
      <div class="ll-result-card" data-ll-reaction-card hidden>
        <img class="ll-humphrey ll-humphrey--big" src="assets/humphrey/humphrey_base_512.webp"
             alt="Ms. Humphrey" width="128" height="128"
             data-ll-humphrey-portrait>
        <p class="ll-result-text" data-ll-reaction></p>
        <div class="ll-result-actions">
          <button class="ll-btn ll-btn--primary" type="button" data-ll-next hidden>Next letter →</button>
          <button class="ll-btn ll-btn--primary" type="button" data-ll-finish hidden>🎉 All done!</button>
        </div>
      </div>
    </section>

  </main>

  <!-- Scripts: load shared utilities first, then Humphrey, then Letter Lab itself -->
  <script src="js/telemetry.js"></script>
  <script src="js/canvas.js"></script>
  <script src="js/humphrey.js"></script>
  <script src="js/letter-lab.js"></script>
  <script src="js/sw-register.js"></script>
</body>
</html>
